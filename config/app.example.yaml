app:
  env: development
  host: 0.0.0.0
  port: 4000
  pollAfterMs: 1500

features:
  cacheEnabled: true

storage:
  workingDirectory: ./.tmp/media-ingest
  completedRetentionHours: 24
  failedRetentionHours: 4
  cleanupCron: 0 * * * *
  ytDlpCookiesFromBrowser: ''
  ytDlpCookiesPath: ''

database:
  url: ''

providers:
  openai:
    enabled: true
    apiKey: ''
    baseUrl: https://api.openai.com/v1
    defaultModel: whisper-1
    diarizeModel: gpt-4o-transcribe-diarize
    translationModel: gpt-5.2-nano
  gemini:
    enabled: true
    apiKey: ''
    geminiTranscriptionModel: gemini-3-flash-preview
    geminiUnderstandingModel: gemini-3.1-pro-preview
  googleCloud:
    enabled: true
    projectId: ''
    location: global
    speechRecognizer: projects/_/locations/global/recognizers/_
    serviceAccountJson: ''

sources:
  googleDrive:
    enabled: true
  telegram:
    enabled: true
    baseUrl: http://localhost:4040
    bearerToken: ''
  ytDlp:
    enabled: true
    binaryPath: yt-dlp
  http:
    enabled: true
    timeoutMs: 30000
