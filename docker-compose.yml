services:
  api:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_INGEST_CONFIG_PATH: /app/config/app.yaml
      YT_DLP_COOKIES_FROM_BROWSER: ${YT_DLP_COOKIES_FROM_BROWSER:-firefox}
    ports:
      - '4000:4000'
    volumes:
      - ./config/app.yaml:/app/config/app.yaml:ro
      - ${MEDIA_INGEST_FIREFOX_DIR}:/root/.mozilla/firefox:ro
      - media-ingest-tmp:/app/.tmp

volumes:
  media-ingest-tmp:
