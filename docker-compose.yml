services:
  api:
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_INGEST_CONFIG_PATH: /app/config/app.yaml
      YT_DLP_COOKIES_PATH: /var/run/media-ingest/cookies/youtube-cookies.txt
    ports:
      - '3000:3000'
    volumes:
      - ./config/app.example.yaml:/app/config/app.yaml:ro
      - ${MEDIA_INGEST_COOKIES_DIR:-./.cookies}:/var/run/media-ingest/cookies:ro
      - media-ingest-tmp:/app/.tmp

volumes:
  media-ingest-tmp:
